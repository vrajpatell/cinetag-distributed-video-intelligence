substitutions:
  _PROJECT_ID: cinetag-distributed-video
  _REGION: us-central1
  _REPOSITORY: cinetag-containers
  # Baked into the Next.js client bundle at build time (runtime Cloud Run env is not enough).
  _NEXT_PUBLIC_API_BASE_URL: https://cinetag-api-1015789800459.us-central1.run.app
steps:
- name: gcr.io/cloud-builders/docker
  args: ['build','-t','${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/cinetag-api:latest','./backend']
- name: gcr.io/cloud-builders/docker
  args: ['build','-t','${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/cinetag-worker:latest','./backend']
- name: gcr.io/cloud-builders/docker
  args:
    - build
    - --build-arg
    - NEXT_PUBLIC_API_BASE_URL=${_NEXT_PUBLIC_API_BASE_URL}
    - --build-arg
    - NEXT_PUBLIC_APP_ENV=gcp
    - -t
    - ${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/cinetag-frontend:latest
    - ./frontend
- name: gcr.io/cloud-builders/docker
  args: ['push','${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/cinetag-api:latest']
- name: gcr.io/cloud-builders/docker
  args: ['push','${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/cinetag-worker:latest']
- name: gcr.io/cloud-builders/docker
  args: ['push','${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/cinetag-frontend:latest']
