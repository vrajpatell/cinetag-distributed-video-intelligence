services:
  postgres:
    image: postgres:16
    environment: {POSTGRES_USER: cinetag, POSTGRES_PASSWORD: cinetag, POSTGRES_DB: cinetag}
    ports: ["5432:5432"]
    healthcheck: {test: ["CMD-SHELL","pg_isready -U cinetag"], interval: 5s, timeout: 5s, retries: 20}
  redis:
    image: redis:7
    ports: ["6379:6379"]
  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment: {MINIO_ROOT_USER: minio, MINIO_ROOT_PASSWORD: minio123}
    ports: ["9000:9000","9001:9001"]
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports: ["8000:8000"]
    depends_on: [postgres,redis]
  worker:
    build: ./backend
    command: python -m app.workers.worker_main
    depends_on: [backend,redis]
  frontend:
    image: node:20
    working_dir: /app
    volumes: ["./frontend:/app"]
    command: sh -c "npm i && npm run dev -- --host"
    ports: ["5173:5173"]
