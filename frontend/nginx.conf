server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/wasm
    image/svg+xml
    font/woff
    font/woff2;

  # Long-cache hashed assets emitted by Vite
  location ^~ /assets/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # Container health endpoint (used by Cloud Run / Docker HEALTHCHECK)
  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # SPA fallback
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri /index.html;
  }
}
